{% extends "main/base.html" %}

{% block title %}Order Success{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="card shadow-sm border-0 text-center">
        <div class="card-body py-5">
            <h2 class="mb-3">Payment Successful</h2>
            <p class="text-muted mb-2">Order ID: #{{ order.id }}</p>
            <p class="text-muted mb-2">Transaction ID: {{ order.transaction_id }}</p>
            <p class="text-muted mb-4">Total: ${{ order.total_amount }}</p>

            <a href="{% url 'games:all_games' %}" class="btn btn-primary">
                Continue Shopping
            </a>
        </div>
    </div>
</div>
{% endblock %}
